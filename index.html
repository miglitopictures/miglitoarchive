     <script>

        // Para testar o redirecionamento no ambiente de desenvolvimento, utilize o servidor gh_pages_sever.py

        // DECODIFICAR A ROTA (404.html redirect)                           __
        // roda apenas se a rota tiver sido encodada por 404.html (site.com/?/)
        let loc = window.location;

        // verificamos se a rota foi um redirecionamento de 404 (encoded)
        let hasEncodedRoute = loc.search.length > 1 && loc.search[1] === '/';

        if (hasEncodedRoute) {
            // dispensamos com slice o "?/" (2 caracteres), then split on "&" in case an original
            // query string got bundled in alongside our route
            let parts = loc.search.slice(2).split('&');

            // Undo the "&" escaping done on the 404 page
            for (let i = 0; i < parts.length; i++) {
                parts[i] = parts[i].replace(/~and~/g, '&');
            }

            // junta novamente a rota com o originalSearchQuery "route?originalQuery", caso exista search query. caso nao o join() nao coloca nada (array com um item)
            let decodedPath = parts.join('?');

            let basePath = loc.pathname;

            let realUrl = basePath + decodedPath + loc.hash;

            // mudamos o url (que ira consequentemente gerar a pagina correta no main.js)
            window.history.replaceState(null, null, realUrl);
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/p5@2.2.3/lib/p5.js" defer></script>
